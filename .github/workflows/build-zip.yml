name: Build PrestaShop Module ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zip:
    name: Build installable ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get module version
        id: version
        run: |
          VERSION=$(grep -oP "version\s*=\s*'\K[^']+" bi_ai_scenes_inpainting/bi_ai_scenes_inpainting.php || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Module version: $VERSION"

      - name: Clean dev files
        run: |
          find bi_ai_scenes_inpainting -name ".gitkeep" -delete 2>/dev/null || true
          find bi_ai_scenes_inpainting -name ".DS_Store" -delete 2>/dev/null || true

      - name: Create installable ZIP at repo root
        run: |
          # Remove old ZIP if exists
          rm -f bi_ai_scenes_inpainting.zip

          # PrestaShop expects: bi_ai_scenes_inpainting/ folder at the root of the ZIP
          zip -r bi_ai_scenes_inpainting.zip bi_ai_scenes_inpainting/ \
            -x "bi_ai_scenes_inpainting/.git/*" \
            -x "bi_ai_scenes_inpainting/node_modules/*" \
            -x "bi_ai_scenes_inpainting/tests/*" \
            -x "bi_ai_scenes_inpainting/.github/*"

          echo "ZIP created:"
          ls -lh bi_ai_scenes_inpainting.zip

      - name: Commit ZIP to repository root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bi_ai_scenes_inpainting.zip
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "build: update bi_ai_scenes_inpainting.zip v${{ steps.version.outputs.version }}"
          git push

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bi_ai_scenes_inpainting-v${{ steps.version.outputs.version }}
          path: bi_ai_scenes_inpainting.zip
          retention-days: 90

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bi_ai_scenes_inpainting.zip
          generate_release_notes: true
