name: QA

# Quality gates that must pass before a PR can be merged.
# Complements build-module-zip.yml (which builds and commits the release
# zip to main after a merge - the zip is intentionally tracked on main
# for the maintainer's convenience).
#
# Checks:
#  - PHPUnit on PHP 7.4 / 8.1 / 8.2 / 8.3 (blocking)
#  - PHPStan level 5 (informational until phpstan-baseline.neon is generated)
#  - PHP-CS-Fixer --dry-run (informational until `composer cs-fix` has been run once)
#  - Guard: version parity config.xml / module file / CHANGELOG (blocking)
#  - Guard: every translation file has within +/-5 keys of en.php (blocking)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'claude/**']

env:
  MODULE_DIR: bi_ai_3dviewer
  MODULE_FILE: bi_ai_3dviewer/bi_ai_3dviewer.php

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, curl
          coverage: none
      - name: Install Composer dependencies
        working-directory: ${{ env.MODULE_DIR }}
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run PHPUnit
        working-directory: ${{ env.MODULE_DIR }}
        run: vendor/bin/phpunit --colors=always tests/

  phpstan:
    name: PHPStan (level 5)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, openssl, curl
      - name: Install Composer dependencies
        working-directory: ${{ env.MODULE_DIR }}
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run PHPStan
        working-directory: ${{ env.MODULE_DIR }}
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse --no-progress || true
          else
            echo "No phpstan config - skipping."
          fi

  cs-fixer:
    name: PHP-CS-Fixer (PSR-12 dry-run)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring
      - name: Install Composer dependencies
        working-directory: ${{ env.MODULE_DIR }}
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run PHP-CS-Fixer
        working-directory: ${{ env.MODULE_DIR }}
        run: |
          if [ -f .php-cs-fixer.dist.php ] || [ -f .php-cs-fixer.php ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no || true
          else
            echo "No CS-Fixer config - skipping."
          fi

  version-parity:
    name: Guard / config.xml, module file and CHANGELOG versions agree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract and compare versions
        run: |
          set -e
          CONFIG_VERSION=$(sed -n 's:.*<version><!\[CDATA\[\(.*\)\]\]></version>.*:\1:p' "${{ env.MODULE_DIR }}/config.xml" | head -n1)
          MODULE_VERSION=$(grep -oE "version = '[^']+'" "${{ env.MODULE_FILE }}" | head -n1 | sed -E "s/.*'([^']+)'/\1/")
          CHANGELOG_VERSION=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -n1 | tr -d '[]' | awk '{print $2}')

          echo "config.xml:    $CONFIG_VERSION"
          echo "module file:   $MODULE_VERSION"
          echo "CHANGELOG top: $CHANGELOG_VERSION"

          if [ -z "$CONFIG_VERSION" ] || [ -z "$MODULE_VERSION" ] || [ -z "$CHANGELOG_VERSION" ]; then
            echo "::error::Unable to extract one of the three versions."
            exit 1
          fi

          if [ "$CONFIG_VERSION" != "$MODULE_VERSION" ] || [ "$CONFIG_VERSION" != "$CHANGELOG_VERSION" ]; then
            echo "::error::Version mismatch between config.xml ($CONFIG_VERSION), module file ($MODULE_VERSION) and CHANGELOG.md ($CHANGELOG_VERSION)."
            exit 1
          fi
          echo "OK: all three report $CONFIG_VERSION."

  i18n-parity:
    name: Guard / translations within +/-5 keys of en.php
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count translation keys (grep-based)
        run: |
          set -e
          TR_DIR="${{ env.MODULE_DIR }}/translations"
          EN="$TR_DIR/en.php"
          if [ ! -f "$EN" ]; then
            echo "::warning::No en.php in translations - skipping i18n parity."
            exit 0
          fi

          count_module_assignments() {
            local target="$1"
            if grep -qE "require_once.*en_[0-9]+\.php" "$target" 2>/dev/null; then
              dir="$(dirname "$target")"
              grep -hcE "^\\\$_MODULE\[" "$dir"/en_*.php 2>/dev/null | awk '{s+=$1} END {print s+0}'
            else
              grep -cE "^\\\$_MODULE\[" "$target" 2>/dev/null || echo 0
            fi
          }

          EN_COUNT=$(count_module_assignments "$EN")
          echo "en.php: $EN_COUNT keys"

          STATUS=0
          for f in "$TR_DIR"/*.php; do
            name=$(basename "$f" .php)
            case "$name" in
              en|index) continue ;;
              en_*) continue ;;
            esac
            count=$(count_module_assignments "$f")
            delta=$((count - EN_COUNT))
            abs_delta=${delta#-}
            echo "$name.php: $count keys (delta $delta)"
            if [ "$abs_delta" -gt 5 ]; then
              echo "::error::$name.php differs from en.php by $abs_delta keys (tolerance: 5)."
              STATUS=1
            fi
          done
          exit $STATUS
